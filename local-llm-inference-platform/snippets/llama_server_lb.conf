# ------------------------------------------------------------------
# Illustrative demo for this portfolio — NOT the operational config.
# All hosts/ports are placeholders.
# ポートフォリオ用の説明デモです。実運用の設定ではありません。
# ホスト・ポートはすべてプレースホルダです。
# ------------------------------------------------------------------
#
# データ並列レプリカ構成（構成C）: 両ノードの llama-server へ
# ラウンドロビンで振り分けるnginxロードバランサ。
# Data-parallel replicas: round-robin across llama-server on both nodes.

upstream llama_replicas {
    # 各ノードで同一モデルをロードした llama-server
    server 203.0.113.10:30000 max_fails=3 fail_timeout=10s;  # node1
    server 203.0.113.11:30000 max_fails=3 fail_timeout=10s;  # node2
}

server {
    listen 8080;

    location / {
        proxy_pass http://llama_replicas;

        # LLM推論は1リクエストが長い: タイムアウトを推論時間に合わせる
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;

        # SSEストリーミング応答をバッファせずに素通しする
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # LBの死活確認用
    location /health {
        return 200 "ok\n";
    }
}
